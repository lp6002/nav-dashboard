<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
body{display:flex;min-height:100vh;background:#f5f0f5;}
.sidebar{width:220px;background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px;font-size:18px;font-weight:800;color:#6a5acd;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f0f0;}
.sidebar-logo .icon{width:28px;height:28px;background:linear-gradient(135deg,#6a5acd,#9b59b6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;}
.sidebar-nav{padding:12px 0;flex:1;}
.nav-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;color:#444;font-size:13px;transition:all .1s;border-left:3px solid transparent;text-decoration:none;}
.nav-item:hover{background:#f8f0ff;color:#6a5acd;}
.nav-item.active{background:#f0e6ff;color:#6a5acd;border-left-color:#6a5acd;font-weight:600;}
.nav-item .ico{width:20px;text-align:center;margin-right:10px;font-size:15px;}
.nav-item .arrow{margin-left:auto;font-size:10px;color:#bbb;}
.nav-divider{height:1px;background:#f0f0f0;margin:6px 16px;}

.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.top-header{display:flex;align-items:center;padding:12px 24px;background:#1a1a2e;gap:20px;}
.top-header a{color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;}
.top-header a:hover{color:#fff;}
.top-header .brand{font-weight:700;color:#fff;}
.top-header .brand .tag{font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:999px;color:rgba(255,255,255,0.6);margin-left:4px;}
.top-header .right{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.4);}

.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tab-bar{display:flex;gap:2px;padding:16px 24px 0;overflow-x:auto;flex-shrink:0;}
.tab{
  padding:10px 20px;border-radius:12px 12px 0 0;font-size:13px;font-weight:600;cursor:pointer;
  color:#888;background:transparent;transition:all .15s;white-space:nowrap;border:none;
}
.tab:hover{color:#6a5acd;background:rgba(106,90,205,0.06);}
.tab.active{color:#6a5acd;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,0.04);position:relative;}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#6a5acd;}

.chat-wrap{flex:1;background:#fff;margin:0 24px 24px;border-radius:0 0 16px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.04);overflow:hidden;display:flex;flex-direction:column;}
.chat-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-header .cicon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.chat-header .cname{font-weight:700;font-size:15px;color:#333;}
.chat-header .cdesc{font-size:12px;color:#999;}
.chat-body{flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:#fafafa;}
.chat-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.launch-card{display:flex;flex-direction:column;align-items:center;gap:16px;padding:30px;text-align:center;max-width:400px;}
.launch-card .licon{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,0.1);}
.launch-card .ltitle{font-size:20px;font-weight:700;color:#333;}
.launch-card .ldesc{font-size:13px;color:#999;line-height:1.6;}
.launch-card .lbtn{padding:14px 36px;border:none;border-radius:999px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;transition:all .15s;box-shadow:0 4px 14px rgba(0,0,0,0.1);}
.launch-card .lbtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);}
.launch-card .ltip{font-size:12px;color:#ccc;margin-top:-8px;}
.chat-footer{text-align:center;font-size:11px;color:#ccc;padding:6px;border-top:1px solid #f5f5f5;flex-shrink:0;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo"><div class="icon">W</div><span>我的工作台</span></div>
  <div class="sidebar-nav">
    <a class="nav-item" href="index.html"><span class="ico">🏠</span><span>主页</span></a>
    <a class="nav-item" href="#"><span class="ico">📊</span><span>广告投放</span><span class="arrow">›</span></a>
    <a class="nav-item" href="games.html"><span class="ico">🎯</span><span>游戏投放管理</span></a>
    <a class="nav-item" href="#"><span class="ico">📋</span><span>日报分析</span></a>
    <a class="nav-item" href="#"><span class="ico">🎮</span><span>游戏管理</span><span class="arrow">›</span></a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="video.html"><span class="ico">🎬</span><span>视频</span></a>
    <a class="nav-item" href="#"><span class="ico">💰</span><span>收益统计</span></a>
    <a class="nav-item" href="#"><span class="ico">🔧</span><span>常用工具</span><span class="arrow">›</span></a>
    <a class="nav-item active" href="ai.html"><span class="ico">🤖</span><span>AI助手</span></a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="#"><span class="ico">⚙️</span><span>配置</span></a>
  </div>
</div>

<div class="main">
  <div class="top-header">
    <a href="index.html" class="brand">🎯 工作台<span class="tag">Beta</span></a>
    <a href="games.html">🎮 游戏投放</a>
    <a href="ai.html">🤖 AI助手</a>
    <span class="right">多模型聊天入口</span>
  </div>

  <div class="content">
    <div class="tab-bar" id="tabBar"></div>
    <div class="chat-wrap">
      <div class="chat-header" id="chatHeader"></div>
      <div class="chat-body" id="chatBody"></div>
      <div class="chat-footer">点击标签切换模型 · 部分模型需登录对应账号</div>
    </div>
  </div>
</div>

<script>
const MODELS = [
  {id:'qwen',     name:'千问',    icon:'Q', color:'#0066ff', url:'https://tongyi.aliyun.com/',         desc:'通义千问 · 阿里云', embed:true},
  {id:'deepseek', name:'Deepseek',icon:'D', color:'#4f46e5', url:'https://chat.deepseek.com/',         desc:'DeepSeek · 深度求索', embed:false},
  {id:'zhipu',    name:'智谱',    icon:'Z', color:'#2563eb', url:'https://chatglm.cn/',                desc:'智谱清言 · GLM', embed:true},
  {id:'doubao',   name:'豆包',    icon:'豆',color:'#e91e63', url:'https://www.doubao.com/',           desc:'豆包 · 字节跳动', embed:true},
  {id:'chatgpt',  name:'ChatGPT', icon:'C', color:'#10a37f', url:'https://chat.openai.com/',          desc:'OpenAI · GPT系列', embed:false},
  {id:'gemini',   name:'Gemini',  icon:'G', color:'#1a73e8', url:'https://gemini.google.com/',        desc:'Google · Gemini', embed:false},
  {id:'claude',   name:'Claude',  icon:'Cl',color:'#d97706', url:'https://claude.ai/',                desc:'Anthropic · Claude', embed:false},
];

let cur = MODELS[0];

function render(){
  document.getElementById('tabBar').innerHTML = MODELS.map(m =>
    `<button class="tab ${m.id===cur.id?'active':''}" onclick="switchTo('${m.id}')">${m.name}</button>`
  ).join('');
  renderBody(cur);
}

function renderBody(m){
  document.getElementById('chatHeader').innerHTML = `
    <div class="cicon" style="background:${m.color};">${m.icon}</div>
    <div><div class="cname">${m.name}</div><div class="cdesc">${m.desc}</div></div>
  `;
  if(m.embed){
    // Sites that support iframe embedding
    document.getElementById('chatBody').innerHTML = `
      <iframe src="${m.url}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" loading="lazy" style="display:block;"></iframe>
    `;
  } else {
    // Sites that block iframe → show a nice launch card
    document.getElementById('chatBody').innerHTML = `
      <div class="launch-card">
        <div class="licon" style="background:${m.color};">${m.icon}</div>
        <div class="ltitle">${m.name}</div>
        <div class="ldesc">
          ${m.name} 不支持在当前页面中直接嵌入<br>
          点击下方按钮，在新窗口中开始聊天
        </div>
        <button class="lbtn" style="background:${m.color};" onclick="window.open('${m.url}','_blank')">
          🚀 打开 ${m.name} 聊天
        </button>
        <div class="ltip">需要登录 ${m.name} 账号</div>
      </div>
    `;
  }
}

function switchTo(id){
  cur = MODELS.find(m => m.id === id);
  render();
}

render();
</script>
</body>
</html>
