<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏投放管理 - 同步版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
body{display:flex;min-height:100vh;background:#f5f0f5;}
.sidebar{width:220px;background:#fff;border-right:1px solid #eee;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:18px 16px;font-size:18px;font-weight:800;color:#6a5acd;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f0f0;}
.sidebar-logo .icon{width:28px;height:28px;background:linear-gradient(135deg,#6a5acd,#9b59b6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;}
.sidebar-nav{padding:12px 0;flex:1;}
.nav-item{display:flex;align-items:center;padding:10px 16px;cursor:pointer;color:#444;font-size:13px;transition:all .1s;border-left:3px solid transparent;text-decoration:none;}
.nav-item:hover{background:#f8f0ff;color:#6a5acd;}
.nav-item.active{background:#f0e6ff;color:#6a5acd;border-left-color:#6a5acd;font-weight:600;}
.nav-item .ico{width:20px;text-align:center;margin-right:10px;font-size:15px;}
.nav-item .arrow{margin-left:auto;font-size:10px;color:#bbb;}
.nav-divider{height:1px;background:#f0f0f0;margin:6px 16px;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.top-header{display:flex;align-items:center;padding:12px 24px;background:#1a1a2e;gap:20px;}
.top-header a{color:rgba(255,255,255,0.75);text-decoration:none;font-size:13px;}
.top-header a:hover{color:#fff;}
.top-header .brand{font-weight:700;color:#fff;}
.top-header .brand .tag{font-size:10px;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:999px;color:rgba(255,255,255,0.6);margin-left:4px;}
.top-header .right{margin-left:auto;font-size:11px;color:rgba(255,255,255,0.4);}
.content{padding:20px 24px;flex:1;overflow:auto;}
.page-title{font-size:20px;font-weight:700;color:#333;margin-bottom:4px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
.page-sub{font-size:13px;color:#999;margin-bottom:16px;}
.summary-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.sum-card{flex:1;min-width:130px;background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.sum-card .label{font-size:12px;color:#999;}
.sum-card .value{font-size:20px;font-weight:700;color:#333;margin-top:4px;}
.sum-card .value .unit{font-size:13px;color:#999;font-weight:400;}
.table-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.04);margin-bottom:16px;background:#fff;}
table{font-size:12px;border-collapse:separate;border-spacing:0;min-width:1200px;width:max-content;}
th{background:#f8f0ff;color:#6a5acd;font-weight:600;padding:10px 8px;text-align:center;border-bottom:2px solid #e8dff5;white-space:nowrap;}
td{padding:8px;text-align:center;border-bottom:1px solid #f5f0f5;white-space:nowrap;height:36px;}
th.sticky,td.sticky{position:sticky;left:0;z-index:2;background:#f8f0ff;will-change:transform;}
td.sticky{background:#fff;}
tr:hover td.sticky{background:#f0ebf8;}
tr:hover td{background:#fcfaff;}
tfoot td.sticky{background:#f8f0ff;}
tfoot td{background:#f8f0ff;font-weight:700;color:#6a5acd;border-top:2px solid #e8dff5;}
.status-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:#999;font-size:14px;gap:8px;}
.loading::after{content:'';width:18px;height:18px;border:2px solid #e0e0e0;border-top-color:#6a5acd;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:#999;padding:8px 16px;background:#f0ebf8;border-radius:8px;margin-bottom:16px;}
.status-bar .dot{width:8px;height:8px;border-radius:50%;background:#1a9d5a;animation:pulse 2s infinite;}
@keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo"><div class="icon">W</div><span>我的工作台</span></div>
  <div class="sidebar-nav">
    <a class="nav-item" href="index.html"><span class="ico">🏠</span><span>主页</span></a>
    <a class="nav-item" href="#"><span class="ico">📊</span><span>广告投放</span><span class="arrow">›</span></a>
    <a class="nav-item active" href="games_sync.html"><span class="ico">🎯</span><span>游戏投放管理</span></a>
    <a class="nav-item" href="#"><span class="ico">📋</span><span>日报分析</span></a>
    <a class="nav-item" href="#"><span class="ico">🎮</span><span>游戏管理</span><span class="arrow">›</span></a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="#"><span class="ico">🎬</span><span>素材创意</span></a>
    <a class="nav-item" href="#"><span class="ico">💰</span><span>收益统计</span></a>
    <a class="nav-item" href="#"><span class="ico">🔧</span><span>常用工具</span><span class="arrow">›</span></a>
    <a class="nav-item" href="ai.html"><span class="ico">🤖</span><span>AI助手</span></a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="#"><span class="ico">⚙️</span><span>配置</span></a>
  </div>
</div>

<div class="main">
  <div class="top-header">
    <a href="index.html" class="brand">🎯 工作台<span class="tag">Beta</span></a>
    <a href="games_sync.html">🎮 游戏投放管理</a>
    <a href="ai.html">🤖 AI助手</a>
    <span class="right">实时同步 · 只读模式</span>
  </div>

  <div class="content">
    <div class="page-title">
      <span>🎯 游戏投放管理</span>
      <span style="font-size:12px;color:#999;font-weight:400;">数据来自密码管理Excel，实时同步</span>
    </div>

    <div class="status-bar" id="statusBar">
      <span class="dot"></span>
      <span>正在连接本地数据服务...</span>
    </div>

    <div id="summaryRow" class="summary-row"></div>
    <div id="tableContainer"><div class="loading">加载数据中</div></div>
  </div>
</div>

<script>
const DATES = ['0603','0604','0605','0606','0607','0608','0609','0610','0611','0612','0613','0614','0615','0616','0617'];
const cw = [60, 150, 210, 140, 80];
const lp = []; let cum = 0;
cw.forEach(w=>{lp.push(cum); cum+=w;});

async function load(){
  try {
    const resp = await fetch('/api/games-data');
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if(data.error) throw new Error(data.error);
    document.getElementById('statusBar').innerHTML = `
      <span class="dot"></span>
      <span>已同步 · 共 ${data.length} 款游戏 · 数据来自密码管理Excel</span>
      <span style="margin-left:auto;color:#ccc;">${new Date().toLocaleTimeString()}</span>
    `;
    render(data);
    renderSummary(data);
  } catch(e){
    document.getElementById('statusBar').innerHTML = `
      <span style="color:#e74c3c;">⚠️</span>
      <span style="color:#e74c3c;">连接失败: ${e.message}</span>
      <span style="margin-left:auto;font-size:11px;color:#ccc;">请确认本地代理已启动 (proxy_server.py)</span>
    `;
    document.getElementById('tableContainer').innerHTML = `
      <div style="padding:60px;text-align:center;color:#999;">
        <div style="font-size:40px;margin-bottom:10px;">🔌</div>
        <div style="font-size:14px;">无法连接到本地数据服务</div>
        <div style="font-size:12px;margin-top:8px;">请双击「启动AI群聊.bat」后再刷新页面</div>
      </div>
    `;
  }
}

function render(data){
  let h = `<div class="table-wrap"><table><thead><tr>`;
  ['投手','游戏名称','包名','后台名称','状态'].forEach((l,i)=>{
    h+=`<th class="sticky" style="left:${lp[i]}px;width:${cw[i]}px;min-width:${cw[i]}px;">${l}</th>`;
  });
  DATES.forEach(d=>{h+=`<th style="width:70px;min-width:70px;">${d}</th>`;});
  h+=`</tr></thead><tbody>`;
  data.forEach(r=>{
    h+=`<tr>`;
    h+=`<td class="sticky" style="left:${lp[0]}px;">${r.uploader}</td>`;
    h+=`<td class="sticky" style="left:${lp[1]}px;">${r.game}</td>`;
    h+=`<td class="sticky" style="left:${lp[2]}px;">${r.pkg}</td>`;
    h+=`<td class="sticky" style="left:${lp[3]}px;">${r.backend}</td>`;
    let sc = r.status==='正常'?'#e6f7ed':r.status==='开跑'?'#fff3e0':r.status==='暂停'?'#fce4ec':'#f5f5f5';
    let tc = r.status==='正常'?'#1a7a3a':r.status==='开跑'?'#cc6a00':r.status==='暂停'?'#c62828':'#999';
    h+=`<td class="sticky" style="left:${lp[4]}px;"><span class="status-badge" style="background:${sc};color:${tc};">${r.status}</span></td>`;
    r.data.forEach(v=>{h+=`<td>${v}</td>`;});
    h+=`</tr>`;
  });
  h+=`</tbody><tfoot><tr>`;
  h+=`<td class="sticky" style="left:0;text-align:right;" colspan="4">📊 汇总</td>`;
  h+=`<td class="sticky" style="left:${lp[4]}px;"></td>`;
  for(let j=0;j<15;j++){
    let s=0,has=false;
    data.forEach(r=>{let n=parseInt((r.data[j]||'-').replace(/,/g,''));if(!isNaN(n)){s+=n;has=true;}});
    h+=`<td style="font-weight:700;">${has?s.toLocaleString():'-'}</td>`;
  }
  h+=`</tr></tfoot></table></div>`;
  document.getElementById('tableContainer').innerHTML = h;
}

function renderSummary(data){
  let games = data.length;
  let uploaders = new Set(data.map(d=>d.uploader)).size;
  let total = 0;
  data.forEach(r=>{r.data.forEach(v=>{let n=parseInt(v);if(!isNaN(n))total+=n;});});
  let active = data.filter(d=>d.status==='正常'||d.status==='开跑').length;
  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-card"><div class="label">在投游戏</div><div class="value">${games} <span class="unit">款</span></div></div>
    <div class="sum-card"><div class="label">投手数</div><div class="value">${uploaders} <span class="unit">人</span></div></div>
    <div class="sum-card"><div class="label">周期总消耗</div><div class="value">${total.toLocaleString()}</div></div>
    <div class="sum-card"><div class="label">活跃中</div><div class="value">${active} <span class="unit">款</span></div></div>`;
}

load();
</script>
</body>
</html>
